<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jenkins CI/CD Deployment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
            padding: 50px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: auto;
        }
        h1 {
            color: #d32f2f;
        }
        .badges {
            margin: 20px 0;
        }
        .badges span {
            background: #e0e0e0;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
            margin: 5px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Successfully Deployed!</h1>
        <p>This application was provisioned via Terraform, configured via Ansible, and orchestrated entirely by a Jenkins CI/CD pipeline.</p>
        
        <div class="badges">
            <span>Jenkins</span>
            <span>Terraform</span>
            <span>Ansible</span>
            <span>AWS EC2</span>
        </div>
        
        <p>Great job on completing Project 03!</p>
    </div>
</body>
</html>
