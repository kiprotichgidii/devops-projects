---
- name: Install and Configure Jenkins
  hosts: jenkins
  become: yes
  tasks:
    - name: Debian and derivatives
      when: ansible_os_family == 'Debian'
      block:
        - name: Update apt cache
          ansible.builtin.apt:
            update_cache: yes
            cache_valid_time: 3600

        - name: Install dependencies (Java, Git, curl, unzip, wget)
          ansible.builtin.apt:
            name:
              - openjdk-21-jre
              - git
              - curl
              - unzip
              - wget
            state: present

        - name: Ensure apt keyrings directory exists
          ansible.builtin.file:
            path: /etc/apt/keyrings
            state: directory
            mode: '0755'

        - name: Add Jenkins repository key
          ansible.builtin.get_url:
            url: https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
            dest: /etc/apt/keyrings/jenkins-keyring.asc

        - name: Add Jenkins repository
          ansible.builtin.apt_repository:
            repo: "deb [signed-by=/etc/apt/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/"
            state: present
            update_cache: yes

        - name: Install Jenkins
          ansible.builtin.apt:
            name: jenkins
            state: present

        - name: Install Terraform
          ansible.builtin.shell: |
            wget -O- https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
            echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
            sudo apt update && sudo apt install -y terraform
          args:
            creates: /usr/bin/terraform

        - name: Setup Ansible
          ansible.builtin.apt:
            name: ansible
            state: present
            update_cache: yes

    - name: Red Hat Enterprise Linux and derivatives
      when: ansible_os_family == 'RedHat'
      block:
        - name: Update DNF cache
          ansible.builtin.dnf:
            update_cache: yes
            cache_valid_time: 3600

        - name: Install dependencies (Java, Git, curl, unzip, wget)
          ansible.builtin.dnf:
            name:
              - java-21-openjdk
              - git
              - curl
              - unzip
              - wget
              - yum-utils
            state: present

        - name: Add Jenkins repository
          ansible.builtin.get_url:
            url: https://pkg.jenkins.io/rpm-stable/jenkins.repo
            dest: /etc/yum.repos.d/jenkins.repo

        - name: Import Jenkins GPG key
          ansible.builtin.rpm_key:
            state: present
            key: https://pkg.jenkins.io/rpm-stable/repodata/repomd.xml.key

        - name: Install Jenkins
          ansible.builtin.dnf:
            name: jenkins
            state: present

        - name: Add Hashicorp repository
          ansible.builtin.yum_repository:
            name: hashicorp
            description: Hashicorp Stable - $basearch
            baseurl: https://rpm.releases.hashicorp.com/RHEL/$releasever/$basearch/stable
            enabled: yes
            gpgcheck: yes
            gpgkey: https://rpm.releases.hashicorp.com/gpg

        - name: Install Terraform
          ansible.builtin.dnf:
            name: terraform
            state: present
            update_cache: yes

        - name: Setup Ansible
          ansible.builtin.dnf:
            name: ansible-core
            state: present
            update_cache: yes

    - name: Common Jenkins setup and services
      block:
        - name: Start and enable Jenkins service
          ansible.builtin.systemd:
            name: jenkins
            state: started
            enabled: yes

        - name: Wait for Jenkins initial admin password file to be created
          ansible.builtin.wait_for:
            path: /var/lib/jenkins/secrets/initialAdminPassword
            state: present
            delay: 5
            timeout: 60

        - name: Retrieve Jenkins initial admin password
          ansible.builtin.command: cat /var/lib/jenkins/secrets/initialAdminPassword
          register: jenkins_admin_password
          changed_when: false

        - name: Display Jenkins Admin Password
          ansible.builtin.debug:
            msg: "The initial Jenkins admin password is: {{ jenkins_admin_password.stdout }}"

        - name: Install AWS CLI
          ansible.builtin.shell: |
            tmp_dir=$(mktemp -d)
            cd "$tmp_dir"
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip -q awscliv2.zip
            sudo ./aws/install
            rm -rf "$tmp_dir"
          args:
            creates: /usr/local/bin/aws
