name: Destroy CloudFormation Infrastructure 02

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: 'Type "destroy" to confirm you want to delete all resources'
        required: true
        default: 'no'

jobs:
  destroy:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm_destroy == 'destroy'
    
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Delete CloudFormation Stack
        run: |
          aws cloudformation delete-stack --stack-name advicemate-cfn-dev
          
      - name: Wait for Stack Deletion
        run: |
          echo "Waiting for the advicemate-cfn-dev stack to be completely deleted..."
          aws cloudformation wait stack-delete-complete --stack-name advicemate-cfn-dev
          echo "Stack deleted successfully!"
