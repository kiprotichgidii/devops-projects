name: Deploy Static Site with Terraform

on:
  push:
    branches:
      - main
    paths:
      - '01-devops-project/terraform/**'
      - '01-devops-project/app/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 01-devops-project/terraform
        
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Invalidate CloudFront Cache
        run: |
          CF_ID=$(terraform output -raw cloudfront_distribution_id)
          aws cloudfront create-invalidation \
            --distribution-id $CF_ID \
            --paths "/*"

      - name: Output CloudFront Domain Name
        run: |
          DOMAIN_NAME=$(terraform output -raw cloudfront_domain_name)
          echo "🚀 Website is live at: https://$DOMAIN_NAME"
