AWSTemplateFormatVersion: '2010-09-09'
Description: S3 Bucket, CloudFront Distribution, and Optional Route 53 setup for Static Website Hosting

Parameters:
  ProjectName:
    Type: String
    Description: Name of the project
    Default: devops-static-site
  Environment:
    Type: String
    Description: Environment name
    Default: dev
  DomainName:
    Type: String
    Description: The custom domain name to use for the website (e.g., example.com). Leave empty to use default CloudFront domain.
    Default: ""

Conditions:
  HasDomainName: !Not [!Equals [!Ref DomainName, ""]]

Resources:
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-${Environment}-site-bucket"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  CloudFrontOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${ProjectName}-${Environment}-oac"
        Description: OAC for static website
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # Route 53 and ACM Resources (Conditionally Created)
  MainZone:
    Type: AWS::Route53::HostedZone
    Condition: HasDomainName
    Properties:
      Name: !Ref DomainName

  SubdomainZone:
    Type: AWS::Route53::HostedZone
    Condition: HasDomainName
    Properties:
      Name: !Sub "${Environment}.${DomainName}"
      HostedZoneTags:
        - Key: Environment
          Value: !Ref Environment

  SubdomainNSRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasDomainName
    Properties:
      HostedZoneId: !Ref MainZone
      Name: !Sub "${Environment}.${DomainName}"
      Type: NS
      TTL: '30'
      ResourceRecords: !GetAtt SubdomainZone.NameServers

  WebsiteCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: HasDomainName
    Properties:
      DomainName: !Sub "${Environment}.${DomainName}"
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Sub "${Environment}.${DomainName}"
          HostedZoneId: !Ref SubdomainZone

  # CloudFront Distribution
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        IPV6Enabled: true
        DefaultRootObject: index.html
        Aliases: !If 
          - HasDomainName
          - - !Sub "${Environment}.${DomainName}"
          - !Ref "AWS::NoValue"
        Origins:
          - DomainName: !GetAtt WebsiteBucket.RegionalDomainName
            Id: !Ref WebsiteBucket
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !GetAtt CloudFrontOriginAccessControl.Id
        DefaultCacheBehavior:
          TargetOriginId: !Ref WebsiteBucket
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          MinTTL: 0
          DefaultTTL: 3600
          MaxTTL: 86400
        Restrictions:
          GeoRestriction:
            RestrictionType: none
        ViewerCertificate: !If
          - HasDomainName
          - AcmCertificateArn: !Ref WebsiteCertificate
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true

  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${WebsiteBucket.Arn}/*"
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  WebsiteDNSRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasDomainName
    Properties:
      HostedZoneId: !Ref SubdomainZone
      Name: !Sub "${Environment}.${DomainName}"
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2 # Hardcoded HostedZone ID for all CloudFront distributions
        EvaluateTargetHealth: false

Outputs:
  BucketName:
    Description: Name of the S3 bucket
    Value: !Ref WebsiteBucket
  CloudFrontDistributionId:
    Description: CloudFront Distribution ID
    Value: !Ref CloudFrontDistribution
  CloudFrontDomainName:
    Description: CloudFront Domain Name
    Value: !GetAtt CloudFrontDistribution.DomainName
  WebsiteURL:
    Description: The final URL of the website
    Value: !If 
      - HasDomainName
      - !Sub "https://${Environment}.${DomainName}"
      - !Sub "https://${CloudFrontDistribution.DomainName}"